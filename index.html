<link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NCA2NCI+PHJlY3Qgd2lkdGg9IjY0IiBoZWlnaHQ9IjY0IiByeD0iMTQiIGZpbGw9IiMyODM4NEEiLz48ZyBmaWxsPSJub25lIiBzdHJva2U9IiNCMDhENTciIHN0cm9rZS13aWR0aD0iMyIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIj48Y2lyY2xlIGN4PSIyMiIgY3k9IjQ0IiByPSI3Ii8+PGNpcmNsZSBjeD0iNDIiIGN5PSI0NCIgcj0iNyIvPjxwYXRoIGQ9Ik0yNiwzOSBMNDYsMTciLz48cGF0aCBkPSJNMzgsMzkgTDE4LDE3Ii8+PC9nPjwvc3ZnPg==">

<style>

:root{
  --wine:#28384A;        /* 深いミッドナイトネイビー */
  --wine-soft:#1E2C3B;
  --paper:#FFFFFF;
  --ivory:#F8F6F2;        /* 温かみのあるオフホワイト */
  --card:#fff;
  --gold:#B08D57;         /* 上品なシャンパンゴールド */
  --hair:#E9E5DE;         /* 温かいグレージュ罫線 */
  --ink:#2A2E33;
  --muted:#9B958C;
  --amber-bg:#F6EEE2; --amber-line:#E0CBA8; --amber-ink:#9A7637;
  --chip-bg:#F0ECE4; --chip-ink:#8A6D3B;
  --ok:#5E7A6B; --booked:#B5836E; --graphite:#4A4F55;
  --c-blue:#28384A; --c-green:#5E7A6B; --c-yellow:#B08D57; --c-red:#A66B57; --c-purple:#6E6385;
}
*{box-sizing:border-box;}
html{color-scheme:light;background:#FFFFFF;}
body{margin:0;background:#FFFFFF;color:#2B2F33;font-family:"Noto Sans JP",sans-serif;font-size:14px;line-height:1.7;-webkit-text-size-adjust:100%;}
.demo-ribbon{position:fixed;top:0;left:0;right:0;background:var(--gold);color:#fff;text-align:center;font-size:11px;letter-spacing:.1em;padding:3px;z-index:200;}
.app{max-width:760px;margin:0 auto;padding:30px 16px 80px;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;background:#28384A;color:#fff;border-radius:4px;margin-bottom:16px;}
.topbar .brand{font-family:"Cormorant Garamond",serif;font-size:22px;font-weight:600;letter-spacing:.04em;}
.topbar .brand small{display:block;font-family:"Noto Sans JP";font-size:9px;letter-spacing:.2em;color:#FFE9B8;}
.topbar .badge{font-size:11px;background:rgba(255,255,255,.14);border:1px solid var(--gold);padding:4px 12px;border-radius:20px;}
.tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:18px;}
.tab{font-size:12px;padding:7px 13px;border-radius:8px;background:var(--ivory);color:var(--muted);border:1px solid var(--hair);cursor:pointer;user-select:none;}
.tab.on{background:var(--wine);color:var(--ivory);border-color:var(--wine);font-weight:700;}
.tab:hover:not(.on){border-color:var(--gold);color:var(--wine);}
.view{display:none;}
.view.on{display:block;animation:fade .25s;}
@keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

.card{background:#fff;color:#2B2F33;border:1px solid var(--hair);border-radius:12px;padding:16px;margin-bottom:12px;}
.card_OLD{background:var(--card);border:1px solid var(--hair);border-radius:12px;padding:16px;margin-bottom:12px;}
h2{font-size:17px;color:var(--wine);margin:0 0 4px;font-weight:700;}
.sub{font-size:12px;color:var(--muted);margin:0 0 14px;}
.num{font-family:"Cormorant Garamond",serif;font-weight:600;color:var(--wine);}
.row{display:flex;align-items:center;justify-content:space-between;padding:11px 4px;border-bottom:1px solid var(--hair);font-size:13px;cursor:pointer;}
.row:last-child{border-bottom:none;}
.row:hover{background:var(--ivory);}
.row .nm{font-weight:700;color:var(--ink);}
.chip{display:inline-block;font-size:10px;padding:2px 9px;border-radius:5px;color:#fff;}
.tag{display:inline-block;background:var(--chip-bg);color:var(--chip-ink);font-size:10px;padding:2px 8px;border-radius:5px;margin-left:6px;}
.btn{display:inline-block;background:var(--wine);color:var(--ivory);font-size:13px;font-weight:700;padding:9px 16px;border-radius:8px;border:none;cursor:pointer;}
.btn.ghost{background:transparent;color:var(--wine);border:1px solid var(--wine);}
.btn.amber{background:var(--amber-bg);color:var(--amber-ink);border:1px solid var(--amber-line);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
input,select,textarea{color-scheme:light;background:#fff;color:#2B2F33;font-family:inherit;font-size:13px;width:100%;padding:8px 10px;border:1px solid var(--hair);border-radius:7px;background:#fff;color:var(--ink);}
label{font-size:11px;color:var(--muted);display:block;margin:8px 0 3px;}
.note-banner{background:var(--amber-bg);border:1px solid var(--amber-line);color:var(--amber-ink);border-radius:9px;padding:11px 14px;font-size:12.5px;margin-bottom:12px;}
.iconbtn{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:7px;border:1px solid var(--hair);background:var(--ivory);cursor:pointer;margin-left:5px;font-size:13px;}
.iconbtn.del{color:var(--amber-ink);border-color:var(--amber-line);background:var(--amber-bg);}
.iconbtn.edit{color:var(--wine);}
.back{font-size:12px;color:var(--wine);cursor:pointer;margin-bottom:10px;display:inline-block;}
.stat{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.stat .b{flex:1;min-width:120px;background:var(--ivory);border:1px solid var(--hair);border-radius:10px;padding:12px;text-align:center;}
.stat .b .v{font-family:"Cormorant Garamond",serif;font-size:26px;font-weight:600;color:var(--wine);}
.stat .b .l{font-size:11px;color:var(--muted);}
.bars{display:flex;align-items:flex-end;gap:5px;height:140px;padding:10px 4px 0;border-bottom:1px solid var(--hair);}
.bars .col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;}
.bars .bar{width:70%;background:linear-gradient(var(--gold),var(--wine));border-radius:3px 3px 0 0;min-height:2px;transition:height .4s;}
.bars .ml{font-size:8.5px;color:var(--muted);margin-top:4px;}
.cal{display:grid;grid-template-columns:42px repeat(2,1fr);gap:3px;font-size:11px;}
.cal .h{background:var(--ivory);font-weight:700;text-align:center;padding:6px 2px;border-radius:4px;}
.cal .slot{background:var(--ivory);text-align:center;padding:6px 2px;border-radius:4px;color:var(--muted);font-size:10px;}
.cal .cell{background:#fff;border:1px solid var(--hair);border-radius:4px;padding:6px 2px;text-align:center;cursor:pointer;min-height:30px;}
.cal .cell.ok{background:#EAF3EE;color:var(--ok);}
.cal .cell.bk{background:var(--graphite);color:#fff;}
.cal .cell.bo{background:#F6E7E7;color:var(--booked);font-weight:700;}
.kcard{border:1px solid var(--hair);border-radius:9px;padding:11px;margin-bottom:9px;}
.kcard .hd{display:flex;justify-content:space-between;align-items:center;}
.kcard .body{font-size:12px;color:var(--muted);margin-top:6px;display:none;}
.kcard.open .body{display:block;}
.kcard .acts{display:flex;justify-content:flex-end;margin-top:8px;display:none;}
.kcard.open .acts{display:flex;}
.schema-pad{text-align:center;}
.schema-pad canvas{border:1px solid var(--hair);border-radius:10px;background:#fff;touch-action:none;}
.tools{display:flex;gap:6px;justify-content:center;align-items:center;flex-wrap:wrap;margin-top:10px;}
.sw{width:24px;height:24px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px var(--hair);cursor:pointer;}
.sw.on{box-shadow:0 0 0 2px var(--wine);}
.tool{padding:5px 10px;border:1px solid var(--hair);border-radius:6px;background:var(--ivory);font-size:11px;cursor:pointer;}
.gal{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.gal .g{aspect-ratio:3/4;border-radius:6px;background:linear-gradient(135deg,var(--chip-bg),var(--ivory));display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:10px;border:1px solid var(--hair);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--wine);color:#fff;padding:10px 20px;border-radius:30px;font-size:13px;opacity:0;transition:.3s;z-index:300;}
.toast.show{opacity:1;}
.search{margin-bottom:12px;}
@media(max-width:600px){.app{padding:26px 12px 80px;}.tab{font-size:11px;padding:6px 10px;}}

/* ===== モードバー ===== */
.demo-ribbon{position:relative;background:var(--gold);color:#fff;text-align:center;font-size:11px;letter-spacing:.05em;padding:6px 10px;line-height:1.5;}
.modebar{position:sticky;top:0;background:var(--ivory);border-bottom:1px solid var(--hair);z-index:190;}
.mb-inner{max-width:760px;margin:0 auto;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;}
.mb-brand{font-family:"Cormorant Garamond",serif;font-size:18px;font-weight:600;color:var(--wine);letter-spacing:.04em;}
.mb-switch{display:flex;background:#fff;border:1px solid var(--hair);border-radius:30px;padding:3px;}
.mb-opt{font-size:12px;padding:6px 16px;border-radius:30px;cursor:pointer;color:var(--muted);font-weight:700;}
.mb-opt.on{background:var(--wine);color:var(--ivory);}
#root{background:#FFFFFF;min-height:100vh;}
#root.app{max-width:760px;margin:0 auto;padding:20px 16px 80px;}

/* ===== お客様サイト ===== */
.front{max-width:680px;margin:0 auto;background:#FFFFFF;}
.fhero{background:#FFFFFF;color:#28384A;padding:72px 28px 60px;text-align:center;position:relative;overflow:hidden;border-bottom:1px solid var(--hair);}
.fh-eyebrow{font-size:10px;letter-spacing:.42em;text-transform:uppercase;color:#B08D57;margin-bottom:18px;font-weight:600;}
.fhero h1{font-family:"Cormorant Garamond",serif;font-size:54px;font-weight:500;margin:0;letter-spacing:.1em;color:#28384A;position:relative;}
.fh-lead{font-size:12.5px;margin:20px auto 30px;color:#5A646E;line-height:2;max-width:340px;letter-spacing:.04em;}
.fbtn-cta{display:inline-block;background:#28384A;color:#fff;font-weight:500;font-size:13px;padding:14px 40px;border-radius:2px;text-decoration:none;cursor:pointer;border:1px solid #28384A;letter-spacing:.14em;transition:.25s;}
.fbtn-cta.full{display:block;width:100%;margin-top:20px;background:#28384A;color:#fff;border-color:#28384A;}
.fbtn-cta:disabled{opacity:.4;cursor:not-allowed;}
.fsec{max-width:600px;margin:0 auto;padding:48px 24px;border-bottom:1px solid var(--hair);background:#FFFFFF;color:#2A2E33;}
.fsec h2{font-family:"Cormorant Garamond",serif;font-size:30px;color:#28384A;font-weight:500;margin:0 0 6px;letter-spacing:.1em;}
.fp{font-size:14px;line-height:1.9;color:#2B2F33;}
.fnote{display:block;font-size:11px;color:var(--muted);margin-top:10px;}
.fmenu{display:flex;flex-direction:column;gap:10px;}
.fmcard{background:#fff;border:1px solid var(--hair);border-radius:4px;padding:18px 20px;display:flex;justify-content:space-between;align-items:center;}
.fmname{font-weight:700;color:var(--ink);}
.fmcat{font-size:10px;background:var(--chip-bg);color:var(--chip-ink);padding:2px 8px;border-radius:5px;margin-left:8px;}
.fmmeta{text-align:right;}
.fmprice{font-family:"Cormorant Garamond",serif;font-size:22px;font-weight:600;color:#28384A;display:block;letter-spacing:.02em;}
.fmmin{font-size:10px;color:var(--muted);}
.fstaff{display:flex;gap:16px;justify-content:center;}
.fscard{text-align:center;}
.favatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-family:"Cormorant Garamond",serif;font-size:26px;font-weight:600;margin:0 auto 8px;}
.fsname{font-weight:700;}
.fsrole{font-size:11px;color:var(--muted);}
.fsec.reserve{background:var(--ivory);}
.rstep{margin-bottom:18px;}
.rs-lab{font-size:13px;font-weight:700;color:var(--wine);margin-bottom:8px;}
.rmenus{display:flex;flex-direction:column;gap:6px;}
.rmenu{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--hair);border-radius:8px;padding:9px 12px;font-size:13px;cursor:pointer;}
.rmenu input{width:auto;flex:none;}
.rmenu span:first-of-type{flex:1;}
.rmprice{font-family:"Cormorant Garamond",serif;color:var(--wine);font-weight:600;}
.rstaff,.rdays,.rtimes{display:flex;gap:8px;flex-wrap:wrap;}
.rst{padding:8px 16px;border:1px solid var(--hair);border-radius:8px;background:#fff;font-size:13px;cursor:pointer;}
.rst.on{background:var(--wine);color:#fff;border-color:var(--wine);}
.rday{width:48px;text-align:center;padding:8px 0;border:1px solid var(--hair);border-radius:8px;background:#fff;font-size:11px;cursor:pointer;}
.rday b{font-family:"Cormorant Garamond",serif;font-size:18px;}
.rday.on{background:var(--wine);color:#fff;border-color:var(--wine);}
.rtimes{margin-top:10px;}
.rtime{padding:8px 12px;border:1px solid var(--hair);border-radius:8px;background:#fff;font-size:13px;cursor:pointer;font-family:"Cormorant Garamond",serif;font-weight:600;color:var(--wine);}
.rtime.on{background:var(--wine);color:#fff;}
.rtime.x{opacity:.3;text-decoration:line-through;cursor:not-allowed;color:var(--muted);}
.rhint{font-size:11px;color:var(--muted);}
.rsummary{background:#fff;border:1px dashed var(--gold);border-radius:8px;padding:12px;font-size:12.5px;color:var(--wine-soft);margin-top:8px;}
.ffoot{text-align:center;color:var(--muted);font-size:12px;padding:30px;}



/* === 高級仕上げ === */
.fbtn-cta:hover{background:#B08D57;border-color:#B08D57;color:#fff;}
.fbtn-cta.full:hover{background:#1E2C3B;border-color:#1E2C3B;}
.fmcat{color:#fff !important;background:var(--wine) !important;font-weight:400;font-size:9.5px;letter-spacing:.08em;padding:3px 9px;}
.fmcat.c-color{background:#6E6385 !important;}
.fmcat.c-perm{background:#B08D57 !important;}
.fmcat.c-care{background:#5E7A6B !important;}
.fmcat.c-straight{background:#A66B57 !important;}
.fmcat.c-cut{background:#28384A !important;}
.fmprice{color:#28384A !important;}
.fmcard{transition:.2s;}
.fmcard:hover{border-color:var(--gold);}
.fsec.reserve{background:#F8F6F2;}
.favatar{box-shadow:none;border:2px solid var(--gold);}
.fscard .fsname{font-family:"Cormorant Garamond",serif;font-size:17px;letter-spacing:.06em;margin-top:4px;}
.card{border-radius:6px;box-shadow:0 1px 3px rgba(40,56,74,.04);border-color:var(--hair);}
.btn{border-radius:4px;letter-spacing:.04em;}
.tab.on{background:var(--wine);border-color:var(--wine);}
.tab{border-radius:4px;}
.rst.on,.rday.on{background:var(--wine);border-color:var(--wine);}
.rsummary{border-color:var(--gold);color:var(--wine-soft);background:#FBFAF7;}
.mb-opt.on{background:var(--wine);}
.mb-brand{color:var(--wine);letter-spacing:.08em;}
.demo-ribbon{background:#28384A;letter-spacing:.06em;}
/* ホッペグリッド 高級トーン */
.hpwrap{border-color:var(--hair);border-radius:4px;}
.hpday{background:#F8F6F2;}
.hpday.sat{color:#28384A;background:#F0ECE4;}
.hpday.sun{color:#A66B57;background:#F6EEE8;}
.hpday b{color:#28384A;}
.hpcell.ok{color:#5E7A6B;}
.hpcell.ok:hover{background:#F0ECE4;}
.hpcell.ok.sel{background:#28384A;color:#fff;}
.hptime{color:#9B958C;border-right:1px solid var(--hair);}
.rs-lab{color:#28384A;letter-spacing:.04em;}
/* セクション間の余白でゆとり */
.fp{color:#2A2E33;line-height:2;}
.ffoot{padding:40px;letter-spacing:.08em;}

/* ===== ヒーロー装飾画 ===== */
.fhero{background:#FFFFFF;color:#28384A;padding:72px 28px 60px;text-align:center;position:relative;overflow:hidden;border-bottom:1px solid var(--hair);}
.fhero-bg{position:absolute;inset:0;width:100%;height:100%;z-index:0;}
.fhero-inner{position:relative;z-index:1;}
.fh-icon{width:46px;height:46px;display:block;margin:0 auto 16px;opacity:.9;}
.fh-rule{width:46px;height:1px;background:#B08D57;margin:16px auto 0;}
.fhero h1{font-family:"Cormorant Garamond",serif;font-size:54px;font-weight:500;margin:0;letter-spacing:.1em;color:#28384A;position:relative;}
/* ヒーローに上下の淡いビネット */
.fhero::after{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 60%,rgba(176,141,87,.06));z-index:0;pointer-events:none;}

/* グリッド枠線を確実に */
.hptable td,.hptable th{border:1px solid #DCD6CC !important;}
.hpcell{border:1px solid #DCD6CC !important;}
.hpcorner,.hptime{border:1px solid #DCD6CC !important;}

/* グリッド中身を白に */
.hpcell{background:#fff !important;}
.hpcell.ok{background:#fff !important;color:#5E7A6B;}
.hpcell.ok:hover{background:#F4F1EA !important;}
.hpcell.ok.sel{background:#28384A !important;color:#fff !important;}
.hpcell.x{background:#fff !important;color:#D6CFC4;}
.hptime{background:#fff !important;}
.hpcorner{background:#fff !important;}

/* ===== 予約一覧 リスト/時系列トグル ===== */
.vtoggle{display:flex;background:var(--ivory);border:1px solid var(--hair);border-radius:30px;padding:3px;}
.vt{font-size:12px;padding:5px 14px;border-radius:30px;cursor:pointer;color:var(--muted);font-weight:700;}
.vt.on{background:var(--wine);color:#fff;}
/* 時系列ビュー */
.tv-nav{display:flex;align-items:center;justify-content:center;gap:18px;margin:6px 0 12px;}
.tv-arrow{width:30px;height:30px;border:1px solid var(--hair);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--wine);font-size:16px;}
.tv-date{font-weight:700;color:var(--wine);font-size:14px;letter-spacing:.04em;}
.tv-wrap{position:relative;}
.tv-grid{position:relative;margin-left:46px;border-left:1px solid var(--hair);}
.tv-hline{position:absolute;left:0;right:0;border-top:1px solid var(--hair);}
.tv-htext{position:absolute;left:-46px;top:-8px;font-size:10px;color:var(--muted);width:42px;text-align:right;font-family:"Cormorant Garamond",serif;}
.tv-now{position:absolute;left:0;right:0;border-top:2px solid #E0856B;z-index:5;}
.tv-now-dot{position:absolute;left:-5px;top:-5px;width:8px;height:8px;border-radius:50%;background:#E0856B;}
.tv-ev{position:absolute;left:4px;right:4px;color:#fff;border-radius:5px;padding:4px 8px;font-size:11.5px;line-height:1.3;overflow:hidden;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.12);}
.tv-ev b{font-family:"Cormorant Garamond",serif;font-size:13px;}


/* ===== 本番フル機能 追加CSS ===== */
.cface{width:64px;height:64px;border-radius:50%;background:var(--ivory);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;overflow:hidden;flex:none;}
.cface img{width:100%;height:100%;object-fit:cover;}
.cface span{font-family:"Cormorant Garamond",serif;font-size:26px;color:var(--wine);}
.sec-h{font-size:14px;color:var(--wine);margin:18px 0 8px;border-left:3px solid var(--gold);padding-left:10px;}
.recipe{font-size:11.5px;color:var(--wine-soft);background:var(--ivory);border-radius:5px;padding:5px 8px;margin:3px 0;}
.recipe-box{border:1px solid var(--hair);border-radius:8px;padding:10px;margin:10px 0;background:#FBFAF7;}
.recipe-h{font-size:12px;font-weight:700;color:var(--wine);margin-bottom:6px;}
details.danger{margin-top:20px;border:1px solid var(--amber-line);border-radius:8px;padding:10px 12px;background:var(--amber-bg);}
details.danger summary{color:var(--amber-ink);font-size:12px;font-weight:700;cursor:pointer;}
details.danger .sub{color:var(--amber-ink);}

<script>
// ===== DEMO HAIR 管理画面デモ アプリ =====
const $ = (s,el=document)=>el.querySelector(s);
const $$ = (s,el=document)=>[...el.querySelectorAll(s)];
const yen = n => '¥' + Number(n).toLocaleString();
const toast = m => { const t=$('#toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); };
const stColor = id => (DEMO.staff.find(s=>s.id===id)||{}).color || '#999';
const stName = id => (DEMO.staff.find(s=>s.id===id)||{}).name || '';

const TABS = [
  ['list','予約一覧'],['cal','カレンダー'],['cust','顧客管理'],
  ['sales','売上管理'],['staff','スタッフ'],['menu','メニュー管理'],['gallery','ギャラリー'],['settings','営業設定'],['manual','取扱説明書']
];
let cur = 'list';

function buildTabs(){
  const wrap = $('#tabs');
  wrap.innerHTML = TABS.map(([id,label])=>`<div class="tab ${id===cur?'on':''}" data-t="${id}">${label}</div>`).join('');
  $$('.tab',wrap).forEach(t=>t.onclick=()=>{ cur=t.dataset.t; buildTabs(); render(); });
}

function render(){
  V().innerHTML = '';
  ({list:vList,cal:vCal,cust:vCust,sales:vSales,staff:vStaff,gallery:vGallery,settings:vSettings,manual:vManual,menu:vMenu}[cur])();
}

// ---- 予約一覧（リスト / 時系列 切替）----
let listMode='list'; // 'list' | 'time'
function vList(){
  let h = `<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
    <h2 style="margin:0;">予約一覧</h2>
    <div class="vtoggle"><span class="vt ${listMode==='list'?'on':''}" data-v="list">リスト</span><span class="vt ${listMode==='time'?'on':''}" data-v="time">時系列</span></div>
  </div>`;
  if(listMode==='list') h += renderListView(); else h += renderTimeView();
  h += `</div>`;
  V().innerHTML = h;
  $$('.vt').forEach(t=>t.onclick=()=>{ listMode=t.dataset.v; vList(); });
  if(listMode==='list'){ $$('.row[data-cid]').forEach(r=>r.onclick=()=>openCustomer(r.dataset.cid)); }
  else { bindTimeView(); }
}
function renderListView(){
  const fut=[...DEMO.future].sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  const byDate={}; fut.forEach(f=>{(byDate[f.date]=byDate[f.date]||[]).push(f);});
  let h=`<p class="sub">これからのご予約。お名前タップで顧客情報へ。</p>`;
  Object.keys(byDate).sort().forEach(d=>{
    h+=`<div style="font-size:12px;color:var(--gold);font-weight:700;margin:12px 0 4px;">${fmtDate(d)}</div>`;
    byDate[d].forEach(f=>{ h+=`<div class="row" data-cid="${f.customer_id}"><span><span class="num" style="font-size:16px;">${f.time}</span>　<span class="nm">${f.name}</span>　${f.menu_name}</span><span class="chip" style="background:${stColor(f.stylist_id)}">${f.stylist_name}</span></div>`; });
  });
  return h;
}
let tvDate=null;
function renderTimeView(){
  // 表示する日付（予約のある最初の日 or 今日）
  const dates=[...new Set(DEMO.future.map(f=>f.date))].sort();
  if(!tvDate) tvDate = dates[0] || '2026-06-29';
  const idx=dates.indexOf(tvDate);
  const dayBookings=DEMO.future.filter(f=>f.date===tvDate).sort((a,b)=>a.time.localeCompare(b.time));
  const hours=[]; for(let hh=7;hh<=19;hh++) hours.push(hh);
  const HBASE=7, PX=46; // 1時間=46px
  let h=`<div class="tv-nav"><span class="tv-arrow" data-nav="-1">‹</span><span class="tv-date">${fmtDateFull(tvDate)}</span><span class="tv-arrow" data-nav="1">›</span></div>`;
  h+=`<div class="tv-wrap"><div class="tv-grid" style="height:${(19-7)*PX}px;">`;
  hours.forEach(hh=>{ h+=`<div class="tv-hline" style="top:${(hh-HBASE)*PX}px;"><span class="tv-htext">${hh}:00</span></div>`; });
  // 現在時刻ライン（デモ：9:09固定っぽく）
  const nowTop=(9+9/60-HBASE)*PX;
  h+=`<div class="tv-now" style="top:${nowTop}px;"><span class="tv-now-dot"></span></div>`;
  // 予約ブロック（同時間帯は横に並べる簡易ロジック）
  dayBookings.forEach((f,i)=>{
    const [hh,mm]=f.time.split(':').map(Number);
    const top=(hh+mm/60-HBASE)*PX;
    const dur=(f.duration_min||60)/60*PX;
    h+=`<div class="tv-ev" data-cid="${f.customer_id}" style="top:${top}px;height:${Math.max(dur-3,26)}px;background:${stColor(f.stylist_id)};"><b>${f.time}</b> ${f.name}<br><span style="opacity:.85;font-size:10px;">${f.menu_name}</span></div>`;
  });
  h+=`</div></div>`;
  if(!dayBookings.length) h+=`<p class="sub" style="text-align:center;margin-top:10px;">この日の予約はありません</p>`;
  return h;
}
function bindTimeView(){
  $$('.tv-arrow').forEach(a=>a.onclick=()=>{
    const dates=[...new Set(DEMO.future.map(f=>f.date))].sort();
    let i=dates.indexOf(tvDate)+ +a.dataset.nav;
    if(i<0)i=0; if(i>=dates.length)i=dates.length-1;
    tvDate=dates[i]; vList();
  });
  $$('.tv-ev').forEach(e=>e.onclick=()=>openCustomer(e.dataset.cid));
}
function fmtDateFull(iso){ if(!iso)return''; const [y,m,d]=iso.split('-'); const wd=['日','月','火','水','木','金','土'][new Date(iso).getDay()]; return `${+m}月${+d}日(${wd})`; }

// ---- カレンダー（今週・空き/予約/ブロック）----
let blocks = {}; // key=date|time|stylist -> true
function vCal(){
  const days = [];
  const base = new Date(2026,5,29);
  for(let i=0;i<2;i++){ const d=new Date(base); d.setDate(base.getDate()+i); days.push(d); }
  const slots = ['10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00'];
  // 既存予約をマップ
  const booked = {};
  DEMO.future.forEach(f=>{ booked[f.date+'|'+f.time]=f; });
  const iso = d=>localISO(d);
  let h = `<div class="card"><h2>カレンダー</h2><p class="sub">空き◯・予約あり・閉じた時間が色で分かります。空き枠をタップでブロック（即・再タップで解除）。</p>`;
  h += `<div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);margin-bottom:8px;"><span>‹ 前の週</span><span style="font-weight:700;color:var(--ink)">${fmtDate(iso(days[0]))} 〜</span><span>次の週 ›</span></div>`;
  h += `<div class="cal"><div class="h"></div>`;
  days.forEach(d=> h+=`<div class="h">${['日','月','火','水','木','金','土'][d.getDay()]} ${d.getDate()}</div>`);
  slots.forEach(s=>{
    h += `<div class="slot">${s}</div>`;
    days.forEach(d=>{
      const k = iso(d)+'|'+s;
      const bk = booked[k];
      const blocked = blocks[k];
      let cls='cell ok',txt='◯';
      if(bk){cls='cell bo';txt=bk.name.slice(0,3);}
      else if(blocked){cls='cell bk';txt='✕';}
      h += `<div class="${cls}" data-k="${k}" data-book="${bk?1:0}">${txt}</div>`;
    });
  });
  h += `</div><div style="display:flex;gap:14px;margin-top:10px;font-size:10.5px;flex-wrap:wrap;">
    <span><span class="chip" style="background:var(--ok)">◯</span> 空き</span>
    <span><span class="chip" style="background:var(--booked)">予約</span> 予約あり</span>
    <span><span class="chip" style="background:var(--graphite)">✕</span> 閉じた時間</span></div></div>`;
  V().innerHTML = h;
  $$('.cal .cell').forEach(c=>{
    if(c.dataset.book==='1'){ c.onclick=()=>toast('予約あり：'+(booked[c.dataset.k].name)); return; }
    c.onclick=()=>{
      if(blocks[c.dataset.k]){ delete blocks[c.dataset.k]; toast('ブロック解除'); }
      else { blocks[c.dataset.k]=true; toast('この時間を閉じました'); }
      vCal();
    };
  });
}

  h += `<h2>${c.name}</h2><p class="sub">来店${c.visit_count}回 ／ 最終来店 ${c.last_visit?fmtDate(c.last_visit):'—'}</p>

    </div>`;
  });
  h += `<button class="btn" id="addK" style="margin-top:6px;">＋ 新しいカルテを追加</button>`;
  // 来店履歴
  h += `<h3 style="font-size:14px;color:var(--wine);margin:18px 0 8px;border-left:3px solid var(--gold);padding-left:10px;">来店履歴（${hist.length}件）</h3>`;

    card.querySelector('[data-schema]').onclick=(e)=>{e.stopPropagation(); openSchema(cid, card.dataset.kid);};

// ---- シェーマ（手描き）----
function openSchema(cid, kid){
  let h = `<div class="card"><span class="back" id="bk">‹ 戻る</span><h2>シェーマ（頭の図に手描き）</h2>
    <p class="sub">色を選んで、頭の図の上に指で描けます。消しゴム・全消去・保存。</p>
    <div class="schema-pad"><canvas id="cv" width="280" height="240"></canvas></div>
    <div class="tools" id="tools">
      <span class="sw on" data-c="#222" style="background:#222"></span>
      <span class="sw" data-c="#7E2E40" style="background:#7E2E40"></span>
      <span class="sw" data-c="#1E5B8A" style="background:#1E5B8A"></span>
      <span class="sw" data-c="#2E7D4F" style="background:#2E7D4F"></span>
      <span class="sw" data-c="#C99A2E" style="background:#C99A2E"></span>
      <span class="sw" data-c="#B23A48" style="background:#B23A48"></span>
      <span class="tool" id="eraser">消しゴム</span>
      <span class="tool" id="clear">全消去</span>
      <span class="tool" id="saveS" style="background:var(--wine);color:#fff;border-color:var(--wine)">保存</span>
    </div></div>`;
  V().innerHTML = h;
  $('#bk').onclick=()=>openCustomer(cid);
  const cv=$('#cv'),ctx=cv.getContext('2d');
  drawHead(ctx);
  let color='#222',erasing=false,drawing=false,last=null;
  $$('#tools .sw').forEach(s=>s.onclick=()=>{ $$('#tools .sw').forEach(x=>x.classList.remove('on')); s.classList.add('on'); color=s.dataset.c; erasing=false; });
  $('#eraser').onclick=()=>{ erasing=!erasing; $('#eraser').style.background=erasing?'var(--gold)':''; $('#eraser').style.color=erasing?'#fff':''; };
  $('#clear').onclick=()=>{ ctx.clearRect(0,0,cv.width,cv.height); drawHead(ctx); toast('全部消しました'); };
  $('#saveS').onclick=()=>toast('シェーマを保存しました（デモ）');
  const pos=e=>{ const r=cv.getBoundingClientRect(); const t=e.touches?e.touches[0]:e; return {x:(t.clientX-r.left)*(cv.width/r.width),y:(t.clientY-r.top)*(cv.height/r.height)}; };
  const start=e=>{drawing=true;last=pos(e);e.preventDefault();};
  const move=e=>{ if(!drawing)return; const p=pos(e); ctx.strokeStyle=erasing?'#fff':color; ctx.lineWidth=erasing?16:3; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke(); if(erasing){drawHeadLine(ctx);} last=p; e.preventDefault(); };
  const end=()=>drawing=false;
  cv.onmousedown=start;cv.onmousemove=move;window.addEventListener('mouseup',end);
  cv.ontouchstart=start;cv.ontouchmove=move;cv.ontouchend=end;
}
function drawHead(ctx){ ctx.clearRect(0,0,280,240); drawHeadLine(ctx); }
function drawHeadLine(ctx){
  ctx.save(); ctx.strokeStyle='#D9C9BE'; ctx.lineWidth=2.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.ellipse(140,120,72,82,0,0,7); ctx.stroke();
  ctx.fillStyle='#D9C9BE';
  ctx.beginPath(); ctx.arc(115,108,4,0,7); ctx.fill();
  ctx.beginPath(); ctx.arc(165,108,4,0,7); ctx.fill();
  ctx.beginPath(); ctx.arc(140,140,0,0,7); ctx.moveTo(118,148); ctx.quadraticCurveTo(140,166,162,148); ctx.stroke();
  // 生え際
  ctx.beginPath(); ctx.moveTo(80,90); ctx.quadraticCurveTo(140,55,200,90); ctx.stroke();
  ctx.restore();
}

function vSales(){
  const ms = DEMO.sales_monthly;
  const max = Math.max(...ms.map(m=>m.total));

  const avg = Math.round(total/ms.length);
  let h = `<div class="card"><h2>売上管理</h2><p class="sub">直近12ヶ月の売上推移。</p>
    <div class="stat">
      <div class="b"><div class="v">${yen(total)}</div><div class="l">年間売上</div></div>
      <div class="b"><div class="v">${yen(avg)}</div><div class="l">月平均</div></div>
      <div class="b"><div class="v">${DEMO.bookings.length}</div><div class="l">年間来店数</div></div>
    </div>
    <div class="bars">`;
  ms.forEach(m=>{
    const hpct = Math.round(m.total/max*100);
    h += `<div class="col"><div class="bar" style="height:${hpct}%" title="${yen(m.total)}"></div><div class="ml">${m.ym.slice(5)}月</div></div>`;
  });
  h += `</div><p class="sub" style="margin-top:10px;">※棒にカーソルを合わせると金額が出ます</p></div>`;
  V().innerHTML = h;
}

  list.forEach(m=>{
    const off = m.active===false;
    h += `<div class="menu-row" data-id="${m.id}" style="display:flex;align-items:center;justify-content:space-between;padding:11px 4px;border-bottom:1px solid var(--hair);${off?'opacity:.45;':''}">
      <span><span class="tag ${CAT_CLS[m.cat]||''}" style="color:#fff">${m.cat}</span> <span class="nm" style="font-weight:700;">${m.name}</span> ${off?'<span class="tag" style="background:#eee;color:#999;">非公開</span>':''}</span>
      <span><span class="num" style="font-size:15px;">${yen(m.price)}</span> <span style="font-size:11px;color:var(--muted);">${m.min}分</span>
        <span class="iconbtn edit" data-edit="${m.id}" title="編集">✎</span>
        <span class="iconbtn del" data-del="${m.id}" title="削除">🗑</span></span>
    </div>`;
  });
  h += `<button class="btn" id="menuAdd" style="margin-top:14px;">＋ 新しいメニューを追加</button></div>`;
  V().innerHTML = h;
  $$('[data-edit]').forEach(b=>b.onclick=()=>menuForm(b.dataset.edit));
  $$('[data-del]').forEach(b=>b.onclick=()=>{ const m=DEMO.menus.find(x=>x.id===b.dataset.del); if(confirm(`「${m.name}」を削除しますか？お客様サイトからも消えます。`)){ const i=DEMO.menus.findIndex(x=>x.id===b.dataset.del); DEMO.menus.splice(i,1); toast('削除しました'); vMenu(); } });
  $('#menuAdd').onclick=()=>menuForm(null);
}

function menuForm(id){
  const m = id ? DEMO.menus.find(x=>x.id===id) : {id:'',name:'',price:5000,min:60,cat:'カット',desc:'',order:DEMO.menus.length+1,active:true};
  let h = `<div class="card"><span class="back" id="bk">‹ メニュー一覧へ戻る</span>
    <h2>${id?'メニューを編集':'新しいメニュー'}</h2>
    <label>メニュー名</label><input id="m-name" value="${m.name}" placeholder="例：カット＋カラー">
    <div style="display:flex;gap:10px;">
      <div style="flex:1;"><label>料金（円）</label><input id="m-price" type="number" value="${m.price}"></div>
      <div style="flex:1;"><label>所要時間（分）</label><input id="m-min" type="number" value="${m.min}"></div>
    </div>
    <label>カテゴリ</label><select id="m-cat">${MENU_CATS.map(c=>`<option ${c===m.cat?'selected':''}>${c}</option>`).join('')}</select>
    <label>説明文</label><textarea id="m-desc" rows="2" placeholder="お客様サイトに表示される説明">${m.desc||''}</textarea>
    <div style="display:flex;gap:10px;align-items:flex-end;">
      <div style="flex:1;"><label>表示順</label><input id="m-order" type="number" value="${m.order||1}"></div>
      <div style="flex:1;"><label>公開状態</label><select id="m-active"><option value="1" ${m.active!==false?'selected':''}>公開（予約可）</option><option value="0" ${m.active===false?'selected':''}>非公開</option></select></div>
    </div>
    <button class="btn" id="m-save" style="margin-top:16px;">${id?'更新する':'追加する'}</button></div>`;
  V().innerHTML = h;
  $('#bk').onclick=()=>vMenu();
  $('#m-save').onclick=()=>{
    const name=$('#m-name').value.trim(); if(!name){toast('メニュー名を入れてください');return;}
    const obj={ name, price:+$('#m-price').value||0, min:+$('#m-min').value||0, cat:$('#m-cat').value, desc:$('#m-desc').value, order:+$('#m-order').value||1, active:$('#m-active').value==='1' };
    if(id){ Object.assign(DEMO.menus.find(x=>x.id===id), obj); toast('メニューを更新しました'); }
    else { obj.id='m'+Date.now(); DEMO.menus.push(obj); toast('メニューを追加しました'); }
    vMenu();
  };
}

  var body='\n\n  <div class="hero">\n    <p class="eyebrow">DEMO HAIR Make — Staff Guide</p>\n    <h1>Owner\'s Manual</h1>\n    <div class="jp">管理画面 取扱説明書（詳細版）</div>\n    <p class="lead">スタッフの皆様へ。この詳細版では、ひとつひとつの操作を画面の図つきで順番に説明します。「どこを押すと、どんな画面になるか」が目で見て分かるようになっています。スマートフォンでそのまま開けます。</p>\n    <span class="badge">画面図つき・操作ステップ完全ガイド</span>\n  </div>\n\n  <nav class="toc">\n    <h2>もくじ</h2>\n    <ol>\n      <li><a href="#mh-s0"><span class="n">0</span><span class="t">はじめに（ログインと画面の見かた）</span></a></li>\n      <li><a href="#mh-s1"><span class="n">1</span><span class="t">予約一覧を見る</span></a></li>\n      <li><a href="#mh-s2"><span class="n">2</span><span class="t">カレンダーと「ブロック」</span></a></li>\n      <li><a href="#mh-s3"><span class="n">3</span><span class="t">顧客管理（情報の登録・注意バナー）</span></a></li>\n      <li><a href="#mh-s4"><span class="n">4</span><span class="t">電子カルテ（施術履歴の記録）★詳しく</span></a></li>\n      <li><a href="#mh-s5"><span class="n">5</span><span class="t">シェーマ（頭の図に手描き）★詳しく</span></a></li>\n      <li><a href="#mh-s6"><span class="n">6</span><span class="t">売上管理</span></a></li>\n      <li><a href="#mh-s7"><span class="n">7</span><span class="t">スタッフ管理</span></a></li>\n      <li><a href="#mh-s8"><span class="n">8</span><span class="t">ギャラリー</span></a></li>\n      <li><a href="#mh-s9"><span class="n">9</span><span class="t">営業設定</span></a></li>\n      <li><a href="#mh-s12"><span class="n">+</span><span class="t">メニュー管理</span></a></li>\n      <li><a href="#mh-s10"><span class="n">—</span><span class="t">困ったとき（トラブル別Q&A）</span></a></li>\n      <li><a href="#mh-s11"><span class="n">—</span><span class="t">個人情報の扱い・大切な約束</span></a></li>\n    </ol>\n  </nav>\n\n  <!-- 0 はじめに -->\n  <section id="mh-s0">\n    <div class="sec-head"><span class="num">0</span><h2>はじめに</h2></div>\n    <p class="sec-sub">ログインのしかたと、画面全体の見かた。</p>\n\n    <h3>ログインする</h3>\n    <ol class="steps">\n      <li>管理画面のURLをスマホのブラウザで開きます。</li>\n      <li>ユーザー名とパスワードを聞かれたら、お店で決めたID・パスワードを入力します。</li>\n      <li>一度ログインすると、しばらくは入力なしで開けます。</li>\n    </ol>\n\n    <div class="phone">\n      <div class="screen">\n        <div class="statusbar">DEMO HAIR 管理画面</div>\n        <div class="scr-pad">\n          <div class="field"><span class="lab">ユーザー名</span>roijir</div>\n          <div class="field"><span class="lab">パスワード</span>••••••••</div>\n          <span class="btn">ログイン</span>\n        </div>\n      </div>\n    </div>\n    <p class="scr-cap">▲ ログイン画面のイメージ</p>\n\n    <div class="tip"><span class="label">便利</span>よく使うので、スマホのホーム画面に追加しておくと、アプリのように1タップで開けます。</div>\n\n    <h3>画面の見かた（タブ）</h3>\n    <p>画面の上に、やりたいことを切り替える「タブ」が並んでいます。<strong>選んでいるタブはワイン色</strong>になります。スマホで入りきらないタブは、右はしの「⋯その他」の中にまとまっています。</p>\n\n    <div class="phone">\n      <div class="screen">\n        <div class="statusbar">DEMO HAIR 管理画面</div>\n        <div class="scr-pad">\n          <div class="tabbar">\n            <span class="tab on">予約一覧</span>\n            <span class="tab">カレンダー</span>\n            <span class="tab">顧客管理</span>\n            <span class="tab">売上</span>\n            <span class="tab">⋯その他</span>\n          </div>\n          <div class="annot"><span class="star">★</span><span>いま選んでいる「予約一覧」がワイン色。タップで他のタブに切り替わります。</span></div>\n        </div>\n      </div>\n    </div>\n    <p class="scr-cap">▲ 画面上部のタブ</p>\n\n    <div class="phone">\n      <div class="screen">\n        <div class="statusbar">⋯ その他</div>\n        <div class="scr-pad">\n          <div class="listrow"><span>スタッフ管理</span><span class="tap">開く ›</span></div>\n          <div class="listrow"><span>営業設定</span><span class="tap">開く ›</span></div>\n          <div class="listrow"><span>ギャラリー</span><span class="tap">開く ›</span></div>\n          <div class="listrow"><span class="t">取扱説明書</span><span class="tap">開く ›</span></div>\n        </div>\n      </div>\n    </div>\n    <p class="scr-cap">▲「⋯その他」を開いたところ。この取扱説明書もここから開けます</p>\n  </section>\n\n  <!-- 1 予約一覧 -->\n  <section id="mh-s1">\n    <div class="sec-head"><span class="num">1</span><h2>予約一覧を見る</h2></div>\n    <p class="sec-sub">今日これからの予約を、まとめて確認します。</p>\n\n    <ul class="bul">\n      <li>お客様のお名前・メニュー・時間・担当が一覧で並びます。</li>\n      <li>新しい予約が入ると、ここに自動で追加されます。</li>\n      <li><strong>お名前をタップ</strong>すると、そのお客様の詳しい情報（顧客管理）へ進めます。</li>\n    </ul>\n\n    <div class="phone">\n      <div class="screen">\n        <div class="statusbar">予約一覧</div>\n        <div class="scr-pad">\n          <div class="tabbar"><span class="tab on">予約一覧</span><span class="tab">カレンダー</span><span class="tab">顧客管理</span></div>\n          <div class="listrow"><span><span class="num-c">10:00</span>\u3000<span class="t">田中様</span>\u3000カット＋カラー</span><span class="chip">YUKI</span></div>\n          <div class="listrow"><span><span class="num-c">13:30</span>\u3000<span class="t">鈴木様</span>\u3000パーマ</span><span class="chip">KAEDE</span></div>\n          <div class="listrow"><span><span class="num-c">16:00</span>\u3000<span class="t">山本様</span>\u3000カット</span><span class="chip">YUKI</span></div>\n          <div class="annot"><span class="star">★</span><span>お名前をタップ → そのお客様のカルテや情報の画面へ進めます。</span></div>\n        </div>\n      </div>\n    </div>\n    <p class="scr-cap">▲ 予約一覧の画面</p>\n  </section>\n\n  <!-- 2 カレンダーとブロック -->\n  <section id="mh-s2">\n    <div class="sec-head"><span class="num">2</span><h2>カレンダーと「ブロック」</h2></div>\n    <p class="sec-sub">予約の埋まり具合を見て、受けられない時間を閉じます。</p>\n\n    <h3>予約の埋まり具合を見る</h3>\n    <p>カレンダーで、日付ごと・時間ごとの予約状況を見られます。<strong>空き・予約あり・閉じた時間</strong>が、色でひと目で分かります。</p>\n\n    <div class="phone">\n      <div class="screen">\n        <div class="statusbar">カレンダー（空き枠）</div>\n        <div class="scr-pad">\n          <div class="tabbar"><span class="tab">予約一覧</span><span class="tab on">カレンダー</span></div>\n          <div style="display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--muted);margin-bottom:7px;">\n            <span>‹ 前の週</span><span style="font-weight:700;color:var(--ink);">6/23 — 6/26</span><span>次の週 ›</span>\n          </div>\n          <div class="wkgrid">\n            <div class="c h"></div><div class="c h">月</div><div class="c h">火</div><div class="c h">水</div><div class="c h">木</div>\n            <div class="c h">10:00</div><div class="c ok">◯</div><div class="c bo">予約</div><div class="c ok">◯</div><div class="c ok">◯</div>\n            <div class="c h">10:30</div><div class="c ok">◯</div><div class="c bo">予約</div><div class="c bk">✕</div><div class="c ok">◯</div>\n            <div class="c h">11:00</div><div class="c bk">✕</div><div class="c ok">◯</div><div class="c bk">✕</div><div class="c ok">◯</div>\n          </div>\n          <div style="display:flex;gap:10px;margin-top:9px;font-size:9.5px;flex-wrap:wrap;">\n            <span><span class="pill ok">◯</span> 空き</span>\n            <span><span class="pill" style="background:#F4E3E3;color:var(--booked);">予約</span> 予約あり</span>\n            <span><span class="pill block">✕</span> 閉じた時間</span>\n          </div>\n        </div>\n      </div>\n    </div>\n    <p class="scr-cap">▲ 週ごとのカレンダー（縦＝時間・横＝日にち）</p>\n\n    <h3>「ブロック」＝その時間を閉じる</h3>\n    <p>休憩・私用・準備などで予約を受けたくない時間は「ブロック」して閉じます。</p>\n    <div class="note"><b>ワンタップで即ブロックされます。</b>確認ボタンはありません。閉じたい枠をタップした瞬間に「✕（閉じた時間）」になります。<br>間違えてタップしたら、<b>もう一度タップ</b>すれば元の空きに戻ります。</div>\n\n    <div class="figrow">\n      <div>\n        <div class="phone" style="max-width:150px;">\n          <div class="screen"><div class="statusbar" style="font-size:9px;">タップ前</div>\n            <div class="scr-pad" style="padding:9px;">\n              <div class="wkgrid" style="grid-template-columns:26px 1fr;">\n                <div class="c h">11:00</div><div class="c ok">◯ 空き</div>\n              </div>\n              <div style="text-align:center;margin-top:6px;"><span class="finger"></span></div>\n            </div>\n          </div>\n        </div>\n        <p class="scr-cap">空き枠をタップ</p>\n      </div>\n      <div>\n        <div class="phone" style="max-width:150px;">\n          <div class="screen"><div class="statusbar" style="font-size:9px;">タップ後</div>\n            <div class="scr-pad" style="padding:9px;">\n              <div class="wkgrid" style="grid-template-columns:26px 1fr;">\n                <div class="c h">11:00</div><div class="c bk">✕ 閉じた</div>\n              </div>\n              <div style="text-align:center;margin-top:6px;font-size:9px;color:var(--ok);">即・閉じる</div>\n            </div>\n          </div>\n        </div>\n        <p class="scr-cap">その場で閉じる</p>\n      </div>\n    </div>\n\n    <div class="tip"><span class="label">安心</span>ブロックした枠は、予約サイト側でも「受付できない時間」として自動で閉じます。お客様がうっかり予約する心配はありません。</div>\n    <div class="tip"><span class="label">使い分け</span>「数時間だけ閉じたい」→ このブロック。「1日まるごと休みにしたい」→ <strong>第9章 営業設定</strong>を使います。</div>\n  </section>\n\n  <!-- 3 顧客管理 -->\n  <section id="mh-s3">\n    <div class="sec-head"><span class="num">3</span><h2>顧客管理</h2></div>\n    <p class="sec-sub">お客様ひとりひとりの情報をまとめる場所です。</p>\n\n    <h3>登録できること</h3>\n    <ul class="bul">\n      <li><strong>顔写真</strong>：撮影・登録できます。写真は鍵のかかった画面でだけ表示され、外部には出ません。</li>\n      <li><strong>住所</strong>：郵便番号を入れると、住所のはじめ（都道府県・市区町村）が<strong>自動で入ります</strong>。</li>\n      <li>お名前・連絡先・ご家族の情報など。</li>\n    </ul>\n\n    <h3>郵便番号で住所を自動入力する</h3>\n    <ol class="steps">\n      <li>郵便番号の欄に7桁を入力します。</li>\n      <li>都道府県・市区町村が<strong>自動で埋まります</strong>。</li>\n      <li>残りの番地・建物名だけ、自分で足します。</li>\n    </ol>\n\n    <div class="phone">\n      <div class="screen">\n        <div class="statusbar">顧客情報の登録</div>\n        <div class="scr-pad">\n          <div class="field"><span class="lab">お名前</span>山本 美咲</div>\n          <div class="field focus"><span class="lab">郵便番号</span>700-0000\u3000<span style="color:var(--gold);font-size:9px;">→ 自動で住所へ</span></div>\n          <div class="field"><span class="lab">住所（自動）</span>岡山県岡山市北区…</div>\n          <div class="field"><span class="lab">番地・建物（手入力）</span>1-2-3 ○○ハイツ101</div>\n          <span class="btn">保存する</span>\n        </div>\n      </div>\n    </div>\n    <p class="scr-cap">▲ 郵便番号を入れると住所のはじめが自動で入ります</p>\n\n    <h3>注意情報バナー（いちばん大事）</h3>\n    <p>アレルギー・パッチテストの結果・既往歴・頭皮や髪の状態など、<strong>施術前に必ず知っておきたいこと</strong>を登録できます。登録すると、お客様の画面の上に<strong>アンバー色（黄土色）の注意バナー</strong>が常に表示されます。</p>\n\n    <div class="phone">\n      <div class="screen">\n        <div class="statusbar">山本 美咲 様</div>\n        <div class="scr-pad">\n          <div class="note" style="margin:0 0 10px;">\n            <b>⚠ 注意</b>\u3000ジアミンアレルギーあり／前回パッチテスト陽性（2026-05-10）。カラー剤の選定に注意。\n          </div>\n          <div class="listrow"><span>連絡先</span><span>090-xxxx-xxxx</span></div>\n          <div class="listrow"><span>顔写真</span><span class="tap">表示 ›</span></div>\n        </div>\n      </div>\n    </div>\n    <p class="scr-cap">▲ 注意情報を登録すると、いちばん上に目立つ色で表示されます</p>\n\n    <div class="note">この注意バナーは、カルテを開いても消えません。<b>施術に入る前に必ず目を通してください。</b></div>\n  </section>\n\n  <!-- 4 電子カルテ ★詳しく -->\n  <section id="mh-s4">\n    <div class="sec-head"><span class="num">4</span><h2>電子カルテ（施術履歴）</h2></div>\n    <p class="sec-sub">来店1回ごとに、やった施術を記録します。次回の参考になります。</p>\n\n    <h3>施術履歴の場所</h3>\n    <p>お客様の画面で「施術履歴」を開きます（ご家族と予約履歴の間にあります）。過去の来店が、<strong>新しい順</strong>にカードで並びます。</p>\n\n    <div class="phone">\n      <div class="screen">\n        <div class="statusbar">山本 美咲 様 ／ 施術履歴</div>\n        <div class="scr-pad">\n          <div class="listrow"><span><span class="num-c">2026-06-20</span>\u3000カット＋カラー</span><span class="num-c">¥7,500</span></div>\n          <div class="listrow"><span><span class="num-c">2026-05-02</span>\u3000カット</span><span class="num-c">¥4,000</span></div>\n          <div class="listrow"><span><span class="num-c">2026-03-15</span>\u3000パーマ</span><span class="num-c">¥9,000</span></div>\n          <span class="btn">＋ 新しい記録を追加</span>\n        </div>\n      </div>\n    </div>\n    <p class="scr-cap">▲ 施術履歴の一覧（新しい順）</p>\n\n    <h3>新しく記録する（ステップ）</h3>\n    <ol class="steps">\n      <li>「＋ 新しい記録を追加」を押します。</li>\n      <li>来店日・メニュー・料金・所要時間を入れます。</li>\n      <li>カラーやパーマの<strong>調合（レシピ）</strong>を入れます。</li>\n      <li>カウンセリングのメモ（ご要望・仕上がり・次回の申し送り）を書きます。</li>\n      <li>「保存」を押すと、履歴の一番上に追加されます。</li>\n    </ol>\n\n    <div class="phone">\n      <div class="screen">\n        <div class="statusbar">新しい記録</div>\n        <div class="scr-pad">\n          <div class="field"><span class="lab">来店日</span>2026-06-28</div>\n          <div class="field"><span class="lab">メニュー</span>カット＋カラー</div>\n          <div style="display:flex;gap:6px;">\n            <div class="field" style="flex:1;"><span class="lab">料金</span>¥7,500</div>\n            <div class="field" style="flex:1;"><span class="lab">所要</span>120分</div>\n          </div>\n          <div class="annot"><span class="star">★</span><span>下に「カラー調合」「パーマ調合」「メモ」が続きます ▼</span></div>\n        </div>\n      </div>\n    </div>\n    <p class="scr-cap">▲ 記録フォームの上半分（基本情報）</p>\n\n    <div class="phone">\n      <div class="screen">\n        <div class="statusbar">新しい記録（つづき）</div>\n        <div class="scr-pad">\n          <div style="font-size:10px;font-weight:700;color:var(--wine);margin-bottom:4px;">カラー調合</div>\n          <div style="display:flex;gap:6px;">\n            <div class="field" style="flex:1;"><span class="lab">薬剤</span>6N+8B</div>\n            <div class="field" style="flex:1;"><span class="lab">オキシ</span>3%</div>\n          </div>\n          <div style="display:flex;gap:6px;">\n            <div class="field" style="flex:1;"><span class="lab">時間</span>25分</div>\n            <div class="field" style="flex:1;"><span class="lab">根元/毛先</span>分けて</div>\n          </div>\n          <div class="field"><span class="lab">メモ（次回への申し送り）</span>明るめ希望。根元しっかり。</div>\n          <span class="btn">保存する</span>\n        </div>\n      </div>\n    </div>\n    <p class="scr-cap">▲ 記録フォームの下半分（調合とメモ）</p>\n\n    <h3>あとから直す・消す</h3>\n    <p>記録したカードには、<strong>編集（鉛筆 ✎）</strong>と<strong>削除（ゴミ箱 🗑）</strong>のボタンがあります。直したいカードのボタンを押します。</p>\n\n    <div class="note">カードが畳まれているときは、まず<b>日付の行をタップして開く</b>と、編集・削除・シェーマのボタンが出てきます。</div>\n\n    <div class="phone">\n      <div class="screen">\n        <div class="statusbar">記録カード（開いた状態）</div>\n        <div class="scr-pad">\n          <div class="listrow"><span><span class="num-c">2026-06-20</span>\u3000カット＋カラー</span><span class="num-c">¥7,500</span></div>\n          <div style="font-size:10.5px;color:var(--muted);padding:6px 3px;border-bottom:1px solid var(--screen-line);">薬剤 6N+8B／オキシ3%／25分\u3000メモ：明るめ希望</div>\n          <div style="display:flex;justify-content:flex-end;align-items:center;padding-top:8px;">\n            <span class="iconbtn edit">✎</span>\n            <span class="iconbtn del">🗑</span>\n            <span class="iconbtn" style="color:var(--wine);">🖌</span>\n          </div>\n          <div class="annot"><span class="star">★</span><span>✎ 編集 ／ 🗑 削除 ／ 🖌 シェーマ（第5章）</span></div>\n        </div>\n      </div>\n    </div>\n    <p class="scr-cap">▲ カードを開くと、編集・削除・シェーマのボタンが出ます</p>\n\n    <div class="note">削除した記録は<b>元に戻せません。</b>消す前にカードの内容を確かめてください。別のお客様の記録を間違って触らないよう、システム側でもしっかり守られています。</div>\n  </section>\n\n  <!-- 5 シェーマ ★詳しく -->\n  <section id="mh-s5">\n    <div class="sec-head"><span class="num">5</span><h2>シェーマ（頭の図に手描き）</h2></div>\n    <p class="sec-sub">カットの設計やカラーの塗り分けを、頭のイラストに直接描いて残せます。</p>\n\n    <h3>5つの向きに描ける</h3>\n    <p>正面・後ろ・左・右・上の5方向の頭の図に、それぞれ手描きできます。記録カードの<strong>シェーマ（🖌）</strong>ボタンから開きます。</p>\n\n    <div class="phone">\n      <div class="screen">\n        <div class="statusbar">シェーマ ／ 向きを選ぶ</div>\n        <div class="scr-pad">\n          <div class="heads">\n            <div><svg class="head-svg" viewBox="0 0 54 54"><circle cx="27" cy="29" r="18" fill="none" stroke="#7E2E40" stroke-width="2.4"/><circle cx="21" cy="27" r="1.4" fill="#7E2E40"/><circle cx="33" cy="27" r="1.4" fill="#7E2E40"/><path d="M21 34 Q27 39 33 34" fill="none" stroke="#7E2E40" stroke-width="1.8" stroke-linecap="round"/></svg><div class="head-lbl">正面</div></div>\n            <div><svg class="head-svg" viewBox="0 0 54 54"><circle cx="27" cy="29" r="18" fill="none" stroke="#7E2E40" stroke-width="2.4"/><circle cx="27" cy="24" r="1.8" fill="#7E2E40"/></svg><div class="head-lbl">後ろ</div></div>\n            <div><svg class="head-svg" viewBox="0 0 54 54"><circle cx="27" cy="29" r="18" fill="none" stroke="#7E2E40" stroke-width="2.4"/><path d="M40 25 Q43 29 40 33" fill="none" stroke="#7E2E40" stroke-width="1.8"/></svg><div class="head-lbl">左</div></div>\n            <div><svg class="head-svg" viewBox="0 0 54 54"><circle cx="27" cy="29" r="18" fill="none" stroke="#7E2E40" stroke-width="2.4"/><path d="M14 25 Q11 29 14 33" fill="none" stroke="#7E2E40" stroke-width="1.8"/></svg><div class="head-lbl">右</div></div>\n            <div><svg class="head-svg" viewBox="0 0 54 54"><circle cx="27" cy="29" r="18" fill="none" stroke="#7E2E40" stroke-width="2.4"/><circle cx="27" cy="29" r="2.2" fill="#7E2E40"/></svg><div class="head-lbl">上</div></div>\n          </div>\n          <div class="annot"><span class="star">★</span><span>描きたい向きをタップ → 手描き画面に進みます。</span></div>\n        </div>\n      </div>\n    </div>\n    <p class="scr-cap">▲ 5つの向きから選びます</p>\n\n    <h3>道具（色・太さ・消しゴム・全消去）</h3>\n    <p>手描き画面の下に、道具が並びます。</p>\n\n    <div class="phone">\n      <div class="screen">\n        <div class="statusbar">シェーマ ／ 正面に手描き</div>\n        <div class="scr-pad">\n          <div style="text-align:center;">\n            <svg viewBox="0 0 120 110" style="width:120px;height:110px;background:#fff;border:1px solid var(--screen-line);border-radius:10px;">\n              <circle cx="60" cy="58" r="40" fill="none" stroke="#C9B8AE" stroke-width="3"/>\n              <circle cx="47" cy="52" r="2.6" fill="#C9B8AE"/><circle cx="73" cy="52" r="2.6" fill="#C9B8AE"/>\n              <path d="M47 70 Q60 80 73 70" fill="none" stroke="#C9B8AE" stroke-width="2.5" stroke-linecap="round"/>\n              <path d="M40 30 Q55 50 75 38" fill="none" stroke="#B23A48" stroke-width="3" stroke-linecap="round"/>\n              <path d="M50 42 L66 30" stroke="#1E5B8A" stroke-width="3" stroke-linecap="round"/>\n            </svg>\n          </div>\n          <div class="pen-row">\n            <span class="sw" style="background:#000"></span>\n            <span class="sw" style="background:#7E2E40"></span>\n            <span class="sw" style="background:#1E5B8A"></span>\n            <span class="sw" style="background:#2E7D4F"></span>\n            <span class="sw" style="background:#C99A2E"></span>\n            <span class="sw" style="background:#B23A48"></span>\n            <span style="width:1px;height:20px;background:var(--screen-line);"></span>\n            <span class="tool">✏</span>\n            <span class="tool">消</span>\n            <span class="tool">全消</span>\n          </div>\n          <div class="annot"><span class="star">★</span><span>左：6色\u3000右：✏太さ／消＝消しゴム／全消＝全部消す</span></div>\n        </div>\n      </div>\n    </div>\n    <p class="scr-cap">▲ 頭の図（うすい線）の上に、色を選んで指で描きます</p>\n\n    <h3>描いて保存する（ステップ）</h3>\n    <ol class="steps">\n      <li>描きたい向きを選びます。</li>\n      <li>色と太さを選んで、指で頭の図の上に描きます。</li>\n      <li>消したいところは<strong>消しゴム</strong>、最初からやり直すときは<strong>全消去</strong>。</li>\n      <li>「保存」を押すと、その向きの絵が記録に残ります。</li>\n    </ol>\n    <ul class="bul">\n      <li>保存した絵は<strong>小さな見本（サムネイル）</strong>で一覧に出ます。</li>\n      <li>あとから<strong>続きを描く</strong>こともできます。</li>\n      <li>いらなくなったら<strong>削除</strong>できます。</li>\n    </ul>\n\n    <div class="tip"><span class="label">安心</span>頭の下絵（うすい顔の線）は、消しゴムや全消去では消えません。<strong>自分で描いた線だけ</strong>が消える仕組みなので、思いきり描いて大丈夫です。</div>\n  </section>\n\n  <!-- 6 売上管理 -->\n  <section id="mh-s6">\n    <div class="sec-head"><span class="num">6</span><h2>売上管理</h2></div>\n    <p class="sec-sub">1週間ごとの売上を、まとめて確認します。</p>\n    <ul class="bul">\n      <li>売上は<strong>日曜はじまりの1週間</strong>でまとまります。</li>\n      <li>左右の<strong>矢印</strong>、または<strong>横にスワイプ</strong>で前の週・次の週へ移動します。</li>\n      <li>棒グラフで、その週の動きがひと目で分かります。</li>\n    </ul>\n\n    <div class="phone">\n      <div class="screen">\n        <div class="statusbar">売上管理</div>\n        <div class="scr-pad">\n          <div style="display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--muted);margin-bottom:6px;">\n            <span>‹ 前の週</span><span style="font-weight:700;color:var(--ink);">6/21 — 6/27</span><span>次の週 ›</span>\n          </div>\n          <div class="bars">\n            <div class="b" style="height:40%"></div><div class="b" style="height:65%"></div>\n            <div class="b" style="height:30%"></div><div class="b" style="height:80%"></div>\n            <div class="b" style="height:55%"></div><div class="b" style="height:95%"></div>\n            <div class="b" style="height:70%"></div>\n          </div>\n          <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--muted);padding:0 4px;">\n            <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>\n          </div>\n          <div class="listrow" style="margin-top:8px;"><span>週合計</span><span class="num-c">¥182,000</span></div>\n        </div>\n      </div>\n    </div>\n    <p class="scr-cap">▲ 週ごとの売上グラフ（矢印か横スワイプで週を切り替え）</p>\n  </section>\n\n  <!-- 7 スタッフ管理 -->\n  <section id="mh-s7">\n    <div class="sec-head"><span class="num">7</span><h2>スタッフ管理</h2></div>\n    <p class="sec-sub">予約サイトに出るスタッフ紹介の情報です。</p>\n    <ul class="bul">\n      <li>スタッフの写真・名前・肩書き（サブタイトル）を登録できます。</li>\n      <li>スタッフごとの<strong>識別色</strong>も選べます（カレンダーの色分けに使われます）。</li>\n      <li>ここで登録した内容が、予約サイトのスタッフ紹介カードにそのまま出ます。</li>\n    </ul>\n\n    <div class="phone">\n      <div class="screen">\n        <div class="statusbar">スタッフ管理 ／ 編集</div>\n        <div class="scr-pad">\n          <div class="field"><span class="lab">名前</span>YUKI</div>\n          <div class="field"><span class="lab">肩書き</span>スタイリスト</div>\n          <div class="field"><span class="lab">識別色</span><span class="sw" style="background:#B2935E;display:inline-block;vertical-align:middle;"></span> 金（#B2935E）</div>\n          <span class="btn">保存する</span>\n        </div>\n      </div>\n    </div>\n    <p class="scr-cap">▲ スタッフの情報と識別色を編集</p>\n  </section>\n\n  <!-- 8 ギャラリー -->\n  <section id="mh-s8">\n    <div class="sec-head"><span class="num">8</span><h2>ギャラリー</h2></div>\n    <p class="sec-sub">仕上がりの写真を、カテゴリ別に載せます。</p>\n    <ul class="bul">\n      <li>スタイル写真をアップロードして、カテゴリで分けて並べられます。</li>\n      <li>載せた写真は予約サイトのギャラリーに表示され、お客様の参考になります。</li>\n    </ul>\n\n    <div class="phone">\n      <div class="screen">\n        <div class="statusbar">ギャラリー</div>\n        <div class="scr-pad">\n          <div class="tabbar"><span class="tab on">スタイル</span><span class="tab">アップスタイル</span><span class="tab">アイメニュー</span></div>\n          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;">\n            <div style="aspect-ratio:3/4;background:var(--chip-bg);border-radius:5px;"></div>\n            <div style="aspect-ratio:3/4;background:var(--ivory);border-radius:5px;border:1px solid var(--screen-line);"></div>\n            <div style="aspect-ratio:3/4;background:var(--chip-bg);border-radius:5px;"></div>\n          </div>\n          <span class="btn ghost" style="margin-top:9px;">＋ 写真を追加</span>\n        </div>\n      </div>\n    </div>\n    <p class="scr-cap">▲ カテゴリ別に写真を並べます</p>\n  </section>\n\n  <!-- 9 営業設定 -->\n  <section id="mh-s9">\n    <div class="sec-head"><span class="num">9</span><h2>営業設定</h2></div>\n    <p class="sec-sub">お店全体の休み・営業の設定です。</p>\n    <ul class="bul">\n      <li>臨時休業など、お店として閉める日を設定できます。</li>\n      <li>定休日・週のはじまりの曜日・予約の時間きざみも設定できます。</li>\n      <li>ここで閉めた日は、予約サイトでも受付できない日になります。</li>\n    </ul>\n\n    <div class="phone">\n      <div class="screen">\n        <div class="statusbar">営業設定</div>\n        <div class="scr-pad">\n          <div class="listrow"><span>定休日</span><span>火曜</span></div>\n          <div class="listrow"><span>週のはじまり</span><span>日曜</span></div>\n          <div class="listrow"><span>予約の時間きざみ</span><span>30分</span></div>\n          <div class="listrow"><span>臨時休業日</span><span class="tap">追加 ›</span></div>\n        </div>\n      </div>\n    </div>\n    <p class="scr-cap">▲ 営業設定の画面</p>\n\n    <div class="tip"><span class="label">使い分け</span>「数時間だけ閉じたい」→ <strong>第2章 ブロック</strong>。「1日まるごと閉めたい」→ この営業設定。</div>\n  </section>\n  <!-- メニュー管理 -->\n  <section id="mh-s12">\n    <div class="sec-head"><span class="num">+</span><h2>メニュー管理</h2></div>\n    <p class="sec-sub">お店のメニューを、自分で追加・編集・削除できます。変更はお客様サイトにすぐ反映されます。</p>\n\n    <h3>できること</h3>\n    <ul class="bul">\n      <li><strong>追加</strong>：新しいメニュー（名前・料金・所要時間・カテゴリ・説明・表示順・公開/非公開）を作れます。</li>\n      <li><strong>編集</strong>：既存メニューの内容を直せます。</li>\n      <li><strong>削除</strong>：使わなくなったメニューを消せます。</li>\n      <li><strong>公開/非公開</strong>：非公開にすると、お客様サイトから一時的に隠せます（消さずに止められます）。</li>\n    </ul>\n\n    <h3>新しいメニューを追加する</h3>\n    <ol class="steps">\n      <li>「メニュー管理」タブを開きます。</li>\n      <li>「＋ 新しいメニューを追加」を押します。</li>\n      <li>名前・料金・所要時間・カテゴリ・説明・表示順を入れます。</li>\n      <li>「追加する」を押すと、一覧に並びます。</li>\n    </ol>\n\n    <div class="phone">\n      <div class="screen">\n        <div class="statusbar">メニュー管理</div>\n        <div class="scr-pad">\n          <div class="listrow"><span><span class="chip" style="background:#28384A">カラー</span> <b>カット＋カラー</b></span><span><span class="num-c">¥9,800</span><span class="iconbtn edit">✎</span><span class="iconbtn del">🗑</span></span></div>\n          <div class="listrow"><span><span class="chip" style="background:#5E7A6B">ケア</span> <b>トリートメント</b></span><span><span class="num-c">¥3,500</span><span class="iconbtn edit">✎</span><span class="iconbtn del">🗑</span></span></div>\n          <span class="btn">＋ 新しいメニューを追加</span>\n        </div>\n      </div>\n    </div>\n    <p class="scr-cap">▲ メニュー一覧。各メニューを編集(✎)・削除(🗑)できます</p>\n\n    <div class="phone">\n      <div class="screen">\n        <div class="statusbar">新しいメニュー</div>\n        <div class="scr-pad">\n          <div class="field"><span class="lab">メニュー名</span>ヘッドスパ</div>\n          <div style="display:flex;gap:6px;">\n            <div class="field" style="flex:1;"><span class="lab">料金</span>¥4,000</div>\n            <div class="field" style="flex:1;"><span class="lab">所要</span>40分</div>\n          </div>\n          <div class="field"><span class="lab">カテゴリ</span>ケア</div>\n          <div class="field"><span class="lab">公開状態</span>公開（予約可）</div>\n          <span class="btn">追加する</span>\n        </div>\n      </div>\n    </div>\n    <p class="scr-cap">▲ 追加フォーム。保存するとお客様サイトにも出ます</p>\n\n    <div class="tip"><span class="label">便利</span>季節限定メニューは「公開」で出して、期間が終わったら「非公開」にすれば、消さずに何度でも使い回せます。</div>\n  </section>\n\n\n  <!-- 10 困ったとき -->\n  <section id="mh-s10">\n    <div class="sec-head"><span class="num">—</span><h2>困ったとき（Q&A）</h2></div>\n    <p class="sec-sub">よくあるトラブルと、その直しかた。</p>\n\n    <div class="faq">\n      <div class="q">Q. 画面が古いまま・新しくならない</div>\n      <div class="a">ページを一度<strong>更新（再読み込み）</strong>してください。スマホのブラウザで、上から下に引っぱると更新できます。それでも直らないときは、一度閉じて開き直してください。</div>\n    </div>\n    <div class="faq">\n      <div class="q">Q. 顔写真やシェーマが出てこない</div>\n      <div class="a">通信が不安定なときに起きやすいです。電波の良い場所で、もう一度開いてください。画像は読み込みに少し時間がかかることがあります。</div>\n    </div>\n    <div class="faq">\n      <div class="q">Q. 保存したのに反映されていない気がする</div>\n      <div class="a">「保存」を押したあと、画面が切り替わるまで少し待ってください。一覧に戻って、新しい順の一番上に出ているか確認します。出ていなければ、もう一度保存し直してください。</div>\n    </div>\n    <div class="faq">\n      <div class="q">Q. ブロックを間違えてタップした</div>\n      <div class="a">同じ枠を<strong>もう一度タップ</strong>すれば、空きに戻ります。ブロックは確認なしで切り替わるので、タップで付けたり外したりできます。</div>\n    </div>\n    <div class="faq">\n      <div class="q">Q. カルテを間違って消してしまった</div>\n      <div class="a">削除した記録は元に戻せません。覚えている内容を、<strong>新しい記録として入れ直して</strong>ください。今後は、消す前にカードの中身を確かめると安心です。</div>\n    </div>\n    <div class="faq">\n      <div class="q">Q. ログインを聞かれた／入れない</div>\n      <div class="a">お店で決めたID・パスワードを入力してください。分からないときは、オーナー（ゆうた様）に確認してください。</div>\n    </div>\n    <div class="faq">\n      <div class="q">Q. それでも直らない</div>\n      <div class="a">無理に操作を続けず、オーナー（ゆうた様）へ「どの画面で・何をしたら・どうなったか」を伝えてください。スクリーンショットがあると早く解決できます。</div>\n    </div>\n  </section>\n\n  <!-- 11 個人情報 -->\n  <section id="mh-s11">\n    <div class="sec-head"><span class="num">—</span><h2>個人情報の扱い・大切な約束</h2></div>\n\n    <div class="note" style="font-size:14px;">\n      顔写真・注意情報・カルテ・シェーマは、すべて<b>鍵のかかった管理画面の中だけ</b>に保管されます。予約サイトなどお客様側の画面には<b>一切表示されません。</b>安心して記録してください。\n    </div>\n\n    <ul class="bul">\n      <li>管理画面は、お店の関係者だけが使うものです。ID・パスワードは人に教えないでください。</li>\n      <li>共用のスマホ・パソコンでは、使い終わったらタブを閉じてください。</li>\n      <li>お客様の情報は、施術とお店の運営のためだけに使います。</li>\n    </ul>\n\n    <div class="tip"><span class="label">困ったら</span>判断に迷うこと・心配なことがあれば、操作する前にオーナー（ゆうた様）に相談してください。</div>\n  </section>\n\n  <div class="foot">\n    <div class="mark">DEMO HAIR</div>\n    DEMO HAIR Make ／ 管理画面 取扱説明書（詳細版・スタッフの皆様向け）<br>\n    本書は管理画面「取扱説明書」タブからいつでも開けます。\n  </div>\n\n';
  V().innerHTML="<div id=\"manualView\"><style>"+css+"</style>"+body+"</div>";
}

function renderReserve(){
  const box = $('#reserveBox');
  // step表示
  box.innerHTML = `
    <div class="rstep">
      <div class="rs-lab">① メニューを選ぶ（複数可）</div>
      <div class="rmenus">${DEMO.menus.filter(m=>m.active!==false).sort((a,b)=>(a.order||0)-(b.order||0)).map(m=>`<label class="rmenu"><input type="checkbox" value="${m.id}"> <span>${m.name}</span><span class="rmprice">${yen(m.price)}</span></label>`).join('')}</div>
    </div>
    <div class="rstep">
      <div class="rs-lab">② 担当を選ぶ</div>
      <div class="rstaff">${DEMO.staff.map(s=>`<span class="rst" data-id="${s.id}">${s.name}</span>`).join('')}<span class="rst" data-id="any">指名なし</span></div>
    </div>
    <div class="rstep">
      <div class="rs-lab">③ 日時を選ぶ</div>
      <div class="hpwrap"><div class="hpgrid" id="hpgrid"></div></div>
      <div class="hphint">◯ 空き ／ × 満 ／ ←→ 横スクロールで先の日付</div>
    </div>
    <div class="rsummary" id="rsum">メニューを選んでください</div>
    <button class="fbtn-cta full" id="doReserve" disabled>この内容で予約する</button>`;
  // メニュー選択
  $$('.rmenu input').forEach(c=>c.onchange=()=>{ syncResv(); });
  // 担当
  $$('.rst').forEach(s=>s.onclick=()=>{ $$('.rst').forEach(x=>x.classList.remove('on')); s.classList.add('on'); resv.stylist=s.dataset.id; syncResv(); });
  // ホットペッパー風グリッド（横=日付14日・火曜除く、縦=時間、◯×）
  const days=[]; let d=new Date(2026,5,29); let cnt=0;
  while(days.length<14){ if(d.getDay()!==2) days.push(new Date(d)); d.setDate(d.getDate()+1); cnt++; if(cnt>30)break; }
  const slots=['10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00','18:30'];
  const wd=['日','月','火','水','木','金','土'];
  const iso=dd=>localISO(dd);
  // 予約済みマップ
  const taken={}; DEMO.future.forEach(f=>{ taken[f.date+'|'+f.time]=true; });
  // ランダムにいくつか満枠を作る（デモらしく）
  function isOpen(date,time){ if(taken[date+'|'+time]) return false; const h=(date+time).split('').reduce((a,c)=>a+c.charCodeAt(0),0); return h%5!==0; }
  let g='<table class="hptable"><thead><tr><th class="hpcorner"></th>';
  days.forEach(dd=>{ const dow=dd.getDay(); const cls=dow===0?'sun':(dow===6?'sat':''); g+=`<th class="hpday ${cls}">${wd[dow]}<br><b>${dd.getMonth()+1}/${dd.getDate()}</b></th>`; });
  g+='</tr></thead><tbody>';
  slots.forEach(s=>{
    g+=`<tr><td class="hptime">${s}</td>`;
    days.forEach(dd=>{ const date=iso(dd); const ok=isOpen(date,s); g+= ok?`<td class="hpcell ok" data-d="${date}" data-t="${s}">◯</td>`:`<td class="hpcell x">×</td>`; });
    g+='</tr>';
  });
  g+='</tbody></table>';
  $('#hpgrid').innerHTML=g;
  $$('.hpcell.ok').forEach(c=>c.onclick=()=>{
    if(c.classList.contains('sel')){ c.classList.remove('sel'); resv.date=null; resv.time=null; syncResv(); return; }
    $$('.hpcell').forEach(x=>x.classList.remove('sel')); c.classList.add('sel'); resv.date=c.dataset.d; resv.time=c.dataset.t; syncResv();
  });
  $('#doReserve').onclick=submitReserve;
}
function renderTimes(date){
  const slots=['10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00'];
  const taken = new Set(DEMO.future.filter(f=>f.date===date).map(f=>f.time));
  $('#rtimes').innerHTML = slots.map(s=> taken.has(s) ? `<span class="rtime x">${s}</span>` : `<span class="rtime" data-t="${s}">${s}</span>`).join('');
  $$('.rtime[data-t]').forEach(t=>t.onclick=()=>{ $$('.rtime').forEach(x=>x.classList.remove('on')); t.classList.add('on'); resv.time=t.dataset.t; syncResv(); });
}
function syncResv(){
  resv.menus = $$('.rmenu input:checked').map(c=>DEMO.menus.find(m=>m.id===c.value));
  const total = resv.menus.reduce((a,m)=>a+m.price,0);
  const min = resv.menus.reduce((a,m)=>a+m.min,0);
  const sum=$('#rsum'); const btn=$('#doReserve');
  if(!resv.menus.length){ sum.textContent='メニューを選んでください'; btn.disabled=true; return; }
  let txt = `${resv.menus.map(m=>m.name).join('・')} ／ 合計 ${yen(total)}・約${min}分`;
  if(resv.stylist) txt += ` ／ 担当 ${resv.stylist==='any'?'指名なし':stName(resv.stylist)}`;
  if(resv.date&&resv.time) txt += ` ／ ${fmtDate(resv.date)} ${resv.time}`;
  sum.textContent = txt;
  btn.disabled = !(resv.menus.length && resv.date && resv.time);
}
function submitReserve(){
  const name = prompt('お名前を入力してください（デモ）','デモ 太郎');
  if(!name) return;
  const st = resv.stylist && resv.stylist!=='any' ? resv.stylist : DEMO.staff[0].id;
  const menuName = resv.menus.map(m=>m.name).join('＋');
  const price = resv.menus.reduce((a,m)=>a+m.price,0);
  const min = resv.menus.reduce((a,m)=>a+m.min,0);
  // 顧客登録（無ければ新規）
  let c = DEMO.customers.find(x=>x.name===name);
  if(!c){ c={id:'c'+Date.now(),name,tel:'090-0000-0000',kana:'',gender:'f',visit_count:0,note:'',care:'',last_visit:resv.date}; DEMO.customers.push(c); }
  DEMO.future.push({id:'f'+Date.now(),date:resv.date,time:resv.time,customer_id:c.id,name,menu_name:menuName,price,duration_min:min,stylist_id:st,stylist_name:stName(st)});
  toast('予約を受け付けました！管理画面の予約一覧に反映されます');
  setTimeout(()=>{ MODE='admin'; cur='list'; buildShell(); routeRender(); toast('▲ 管理画面の予約一覧に、今の予約が出ています'); },1400);
}

function openCustomer(cid){
  const c = DEMO.customers.find(x=>x.id===cid);
  const ks = DEMO.karte.filter(k=>k.customer_id===cid).sort((a,b)=>b.visit_date.localeCompare(a.visit_date));
  const hist = DEMO.bookings.filter(b=>b.customer_id===cid).sort((a,b)=>b.date.localeCompare(a.date));
  const initial = (c.name||'＊').replace(/\s/g,'')[0];
  let h = `<div class="card"><span class="back" id="bk">‹ 顧客一覧へ戻る</span>`;
  if(c.care) h += `<div class="note-banner"><b>⚠ 注意</b>　${c.care}</div>`;
  // 顔写真＋基本
  h += `<div style="display:flex;gap:14px;align-items:center;margin-bottom:8px;">
    <div class="cface" id="cface">${c.face?`<img src="${c.face}">`:`<span>${initial}</span>`}</div>
    <div><h2 style="margin:0;">${c.name}</h2><p class="sub" style="margin:2px 0 0;">${c.kana||''}</p>
    <p class="sub" style="margin:2px 0 0;">来店${c.visit_count}回 ／ 最終 ${c.last_visit?fmtDate(c.last_visit):'—'}</p></div></div>
    <button class="btn ghost" id="cphoto" style="font-size:11px;padding:6px 12px;">📷 顔写真を設定</button>
    <input type="file" id="cfile" accept="image/*" style="display:none;">`;
  // 詳細項目
  h += `<div style="margin-top:14px;">
    <div class="row" style="cursor:default"><span>誕生日</span><span>${c.birthday||'—'}</span></div>
    <div class="row" style="cursor:default"><span>連絡先</span><span>${c.tel}</span></div>
    <div class="row" style="cursor:default"><span>郵便番号</span><span>${c.postal||'—'}</span></div>
    <div class="row" style="cursor:default"><span>住所</span><span style="font-size:12px;text-align:right;max-width:60%;">${c.address||'—'}</span></div>

  h += `<h3 class="sec-h">ご家族</h3>`;

  else h+=`<p class="sub">登録なし</p>`;

  h += `<h3 class="sec-h">施術履歴（カルテ）</h3>`;
  if(!ks.length) h += `<p class="sub">まだカルテ記録がありません。</p>`;
  ks.forEach(k=>{
    let recipe='';
    if(k.color_recipe) recipe=`<div class="recipe">🎨 カラー：${k.color_recipe.agent}／オキシ${k.color_recipe.oxy}／${k.color_recipe.time}／根元${k.color_recipe.root}・毛先${k.color_recipe.ends}</div>`;
    if(k.perm_recipe) recipe+=`<div class="recipe">🌀 パーマ：ロッド${k.perm_recipe.rod}／${k.perm_recipe.lotion}／${k.perm_recipe.time}</div>`;
    if(!recipe&&k.recipe) recipe=`<div class="recipe">${k.recipe}</div>`;
    const sc = k.schema&&Object.keys(k.schema).length ? `<span class="tag" style="background:var(--chip-bg);color:var(--chip-ink)">🖌 シェーマ${Object.keys(k.schema).length}面</span>`:'';
    h += `<div class="kcard" data-kid="${k.id}">
      <div class="hd"><span><span class="num" style="font-size:15px;">${fmtDate(k.visit_date)}</span>　${k.menu_name} ${sc}</span><span class="num">${yen(k.price)}</span></div>
      <div class="body">${recipe}メモ：${k.memo||'—'}　／　担当：${stName(k.stylist_id)}</div>
      <div class="acts"><span class="iconbtn edit" title="編集">✎</span><span class="iconbtn del" title="削除">🗑</span><span class="iconbtn" title="シェーマ" data-schema="${k.id}" style="color:var(--wine)">🖌</span></div>
    </div>`;
  });
  h += `<button class="btn" id="addK" style="margin-top:6px;">＋ 新しいカルテを追加</button>`;
  // 来店履歴
  h += `<h3 class="sec-h">来店履歴（${hist.length}件）</h3>`;
  hist.slice(0,8).forEach(b=>{ h += `<div class="row" style="cursor:default"><span><span class="num">${fmtDate(b.date)}</span>　${b.menu_name}</span><span class="num">${yen(b.price)}</span></div>`; });
  // 顧客削除（名前一致）
  h += `<details class="danger"><summary>この顧客を削除</summary>
    <p class="sub">顔写真・全カルテ・シェーマも完全に削除され、元に戻せません。確認のため<b>「${c.name}」</b>と入力してください。</p>
    <input id="delName" placeholder="顧客名を入力"><button class="btn amber" id="delBtn" style="margin-top:8px;" disabled>削除する</button></details>`;
  h += `</div>`;
  V().innerHTML = h;
  $('#bk').onclick=()=>vCust();
  // 顔写真
  $('#cphoto').onclick=()=>$('#cfile').click();
  $('#cfile').onchange=(e)=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{ c.face=r.result; toast('顔写真を設定しました'); openCustomer(cid); }; r.readAsDataURL(f); };
  $('#cedit').onclick=()=>editCustomer(cid);
  // カルテ
  $$('.kcard').forEach(card=>{
    card.querySelector('.hd').onclick=()=>card.classList.toggle('open');
    card.querySelector('.del').onclick=(e)=>{e.stopPropagation(); if(confirm('このカルテを削除しますか？')){ const i=DEMO.karte.findIndex(x=>x.id===card.dataset.kid); if(i>=0)DEMO.karte.splice(i,1); toast('削除しました'); openCustomer(cid);} };
    card.querySelector('.edit').onclick=(e)=>{e.stopPropagation(); editKarte(cid, card.dataset.kid);};
    card.querySelector('[data-schema]').onclick=(e)=>{e.stopPropagation(); openSchema(cid, card.dataset.kid);};
  });
  $('#addK').onclick=()=>addKarte(cid);
  // 削除
  const dn=$('#delName'),db=$('#delBtn');
  dn.oninput=()=>{ db.disabled = dn.value.trim()!==c.name; };
  db.onclick=()=>{ if(confirm('本当に削除しますか？元に戻せません。')){ const i=DEMO.customers.findIndex(x=>x.id===cid); DEMO.customers.splice(i,1); DEMO.karte=DEMO.karte.filter(k=>k.customer_id!==cid); toast('顧客を削除しました'); vCust(); } };
}

// 顧客 情報編集（住所・郵便番号自動入力つき）
function editCustomer(cid){
  const c=DEMO.customers.find(x=>x.id===cid);
  let h=`<div class="card"><span class="back" id="bk">‹ 戻る</span><h2>情報を編集</h2>
    <label>お名前</label><input id="e-name" value="${c.name}">
    <label>フリガナ</label><input id="e-kana" value="${c.kana||''}">
    <label>誕生日</label><input id="e-bd" type="date" value="${c.birthday||''}">
    <label>連絡先</label><input id="e-tel" value="${c.tel||''}">
    <label>郵便番号（7桁で住所自動入力）</label><input id="e-postal" value="${c.postal||''}" placeholder="例：1500001">
    <label>住所</label><input id="e-addr" value="${c.address||''}">
    <label>メモ</label><textarea id="e-note" rows="2">${c.note||''}</textarea>
    <label>注意情報（アレルギー・既往歴など）</label><textarea id="e-care" rows="2" placeholder="施術前に必ず確認したいこと">${c.care||''}</textarea>
    <button class="btn" id="e-save" style="margin-top:14px;">保存する</button></div>`;
  V().innerHTML=h;
  $('#bk').onclick=()=>openCustomer(cid);
  // 郵便番号→住所自動入力（zipcloud）
  $('#e-postal').oninput=async(e)=>{
    const z=e.target.value.replace(/[^0-9]/g,'');
    if(z.length===7){
      try{ const r=await fetch(`https://zipcloud.ibsnet.co.jp/api/search?zipcode=${z}`); const j=await r.json();
        if(j.results&&j.results[0]){ const a=j.results[0]; $('#e-addr').value=a.address1+a.address2+a.address3; toast('住所を自動入力しました'); } }catch(_){ toast('住所の自動取得に失敗（デモ）'); }
    }
  };
  $('#e-save').onclick=()=>{ c.name=$('#e-name').value; c.kana=$('#e-kana').value; c.birthday=$('#e-bd').value; c.tel=$('#e-tel').value; c.postal=$('#e-postal').value; c.address=$('#e-addr').value; c.note=$('#e-note').value; c.care=$('#e-care').value; toast('保存しました'); openCustomer(cid); };
}

function shiftStaff(i){
  const s=DEMO.staff[i]; const wd=['日','月','火','水','木','金','土'];
  let h=`<div class="card"><span class="back" id="bk">‹ 戻る</span><h2>${s.name} のシフト</h2><p class="sub">曜日ごとの営業時間・同時受付数。休みの曜日は「休み」に。</p>`;
  for(let d=0;d<7;d++){ const sc=s.schedule&&s.schedule[d]; h+=`<div class="shift-row" data-d="${d}" style="display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:1px solid var(--hair);">
    <span style="width:24px;font-weight:700;${d===0?'color:var(--c-red)':d===6?'color:var(--c-blue)':''}">${wd[d]}</span>
    <select class="sh-on" style="flex:none;width:64px;"><option value="1" ${sc?'selected':''}>営業</option><option value="0" ${!sc?'selected':''}>休み</option></select>
    <input class="sh-open" type="time" value="${sc?sc.open:'10:00'}" ${!sc?'disabled':''} style="flex:1;">
    <input class="sh-close" type="time" value="${sc?sc.close:'19:00'}" ${!sc?'disabled':''} style="flex:1;">
    <input class="sh-cap" type="number" value="${sc?sc.capacity:1}" min="1" ${!sc?'disabled':''} style="width:46px;flex:none;" title="同時受付数">
  </div>`; }
  h+=`<button class="btn" id="sh-save" style="margin-top:12px;">シフトを保存</button></div>`;
  V().innerHTML=h; $('#bk').onclick=()=>vStaff();
  $$('.sh-on').forEach(sel=>sel.onchange=()=>{ const row=sel.closest('.shift-row'); const on=sel.value==='1'; ['sh-open','sh-close','sh-cap'].forEach(c=>row.querySelector('.'+c).disabled=!on); });
  $('#sh-save').onclick=()=>{ $$('.shift-row').forEach(row=>{ const d=+row.dataset.d; const on=row.querySelector('.sh-on').value==='1'; s.schedule[d]= on?{open:row.querySelector('.sh-open').value,close:row.querySelector('.sh-close').value,capacity:+row.querySelector('.sh-cap').value}:null; }); toast('シフトを保存しました'); vStaff(); };
}

// ===== 第4弾：予約一覧（新規予約・チェックイン・会計）=====
// vList は app.js のリスト⇄時系列を活かしつつ、新規予約FAB＋詳細操作を足す
function vList(){
  let h = `<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
    <h2 style="margin:0;">予約一覧</h2>
    <div class="vtoggle"><span class="vt ${listMode==='list'?'on':''}" data-v="list">リスト</span><span class="vt ${listMode==='time'?'on':''}" data-v="time">時系列</span></div>
  </div>`;
  if(listMode==='list') h += renderListView(); else h += renderTimeView();
  h += `<button class="btn" id="newBk" style="margin-top:12px;">＋ 新規予約を作成</button></div>`;
  V().innerHTML = h;
  $$('.vt').forEach(t=>t.onclick=()=>{ listMode=t.dataset.v; vList(); });
  if(listMode==='list'){ $$('.row[data-bid]').forEach(r=>r.onclick=()=>bookingDetail(r.dataset.bid)); }
  else bindTimeView();
  $('#newBk').onclick=()=>newBooking();
}
function renderListView(){
  const fut=[...DEMO.future].sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  const byDate={}; fut.forEach(f=>{(byDate[f.date]=byDate[f.date]||[]).push(f);});
  let h=`<p class="sub">これからのご予約。タップで来店受付・会計ができます。</p>`;
  Object.keys(byDate).sort().forEach(d=>{
    h+=`<div style="font-size:12px;color:var(--gold);font-weight:700;margin:12px 0 4px;">${fmtDate(d)}</div>`;
    byDate[d].forEach(f=>{
      const ci = f.checked_in?'<span class="tag" style="background:var(--ok);color:#fff">来店済</span>':'';
      const st = f.settled?'<span class="tag" style="background:var(--muted);color:#fff">会計済</span>':'';
      h+=`<div class="row" data-bid="${f.id}"><span><span class="num" style="font-size:16px;">${f.time}</span>　<span class="nm">${f.name}</span>　${f.menu_name} ${ci}${st}</span><span class="chip" style="background:${stColor(f.stylist_id)}">${f.stylist_name}</span></div>`;
    });
  });
  return h;
}
function bookingDetail(bid){
  const f=DEMO.future.find(x=>x.id===bid); if(!f)return;
  let h=`<div class="card"><span class="back" id="bk">‹ 予約一覧へ</span><h2>予約の詳細</h2>
    <div class="row" style="cursor:default"><span>日時</span><span>${fmtDate(f.date)} ${f.time}</span></div>
    <div class="row" style="cursor:default"><span>お客様</span><span>${f.name}</span></div>
    <div class="row" style="cursor:default"><span>メニュー</span><span>${f.menu_name}</span></div>
    <div class="row" style="cursor:default"><span>担当</span><span>${f.stylist_name}</span></div>
    <div class="row" style="cursor:default"><span>料金</span><span class="num">${yen(f.price)}</span></div>
    <div style="display:flex;gap:8px;margin-top:16px;">
      <button class="btn ${f.checked_in?'ghost':''}" id="ci">${f.checked_in?'✓ 来店受付済み':'来店受付する'}</button>
      <button class="btn ${f.settled?'ghost':''}" id="settle">${f.settled?'✓ 会計済み':'会計する'}</button>
    </div>
    <button class="btn ghost" id="editBk" style="margin-top:10px;">✎ 予約を編集</button>
    <button class="btn amber" id="delBk" style="margin-top:8px;">予約を取り消す</button></div>`;

// ===== 定休日・臨時休業の共通判定 =====
function localISO(d){ const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${dd}`; }
const WD_NAME = ['日','月','火','水','木','金','土'];
function isClosedDay(dateObj){
  // 臨時休業
  const iso = localISO(dateObj);
  if(DEMO.settings && DEMO.settings.special_off && DEMO.settings.special_off.some(o=>o.date===iso)) return true;
  // 定休日（曜日・第N週対応）
  if(DEMO.settings && DEMO.settings.closed_rules){
    const wd = dateObj.getDay();
    for(const r of DEMO.settings.closed_rules){
      const rwd = WD_NAME.indexOf(r.weekday);
      if(rwd===wd){
        if(!r.nth) return true; // 毎週
        // 第N週判定
        const nth = Math.floor((dateObj.getDate()-1)/7)+1;
        if(nth===r.nth) return true;
      }
    }
  }
  return false;
}

// 予約グリッド（front）の日付生成を定休日連動に差し替え
function renderReserve(){
  const box = $('#reserveBox');
  box.innerHTML = `
    <div class="rstep"><div class="rs-lab">① メニューを選ぶ（複数可）</div>
      <div class="rmenus">${DEMO.menus.filter(m=>m.active!==false).sort((a,b)=>(a.order||0)-(b.order||0)).map(m=>`<label class="rmenu"><input type="checkbox" value="${m.id}"> <span>${m.name}</span><span class="rmprice">${yen(m.price)}</span></label>`).join('')}</div></div>
    <div class="rstep"><div class="rs-lab">② 担当を選ぶ</div>
      <div class="rstaff">${DEMO.staff.filter(s=>s.active!==false).map(s=>`<span class="rst" data-id="${s.id}">${s.name}</span>`).join('')}<span class="rst" data-id="any">指名なし</span></div></div>
    <div class="rstep"><div class="rs-lab">③ 日時を選ぶ</div>
      <div class="hpwrap"><div class="hpgrid" id="hpgrid"></div></div>
      <div class="hphint">◯ 空き ／ × 満・休 ／ ←→ 横スクロールで先の日付</div></div>
    <div class="rsummary" id="rsum">メニューを選んでください</div>
    <button class="fbtn-cta full" id="doReserve" disabled>この内容で予約する</button>`;
  $$('.rmenu input').forEach(c=>c.onchange=()=>syncResv());
  $$('.rst').forEach(s=>s.onclick=()=>{ $$('.rst').forEach(x=>x.classList.remove('on')); s.classList.add('on'); resv.stylist=s.dataset.id; syncResv(); });
  // 定休日を除外して14営業日を集める
  const days=[]; let d=new Date(2026,5,29); let cnt=0;
  while(days.length<14){ if(!isClosedDay(d)) days.push(new Date(d)); d.setDate(d.getDate()+1); cnt++; if(cnt>40)break; }
  const slots=['10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00','18:30'];
  const iso=dd=>localISO(dd);
  const taken={}; DEMO.future.forEach(f=>{ taken[f.date+'|'+f.time]=true; });
  function isOpen(date,time){ if(taken[date+'|'+time])return false; const h=(date+time).split('').reduce((a,c)=>a+c.charCodeAt(0),0); return h%5!==0; }
  let g='<table class="hptable"><thead><tr><th class="hpcorner"></th>';
  days.forEach(dd=>{ const dow=dd.getDay(); const cls=dow===0?'sun':(dow===6?'sat':''); g+=`<th class="hpday ${cls}">${WD_NAME[dow]}<br><b>${dd.getMonth()+1}/${dd.getDate()}</b></th>`; });
  g+='</tr></thead><tbody>';
  slots.forEach(s=>{ g+=`<tr><td class="hptime">${s}</td>`; days.forEach(dd=>{ const date=iso(dd); const ok=isOpen(date,s); g+= ok?`<td class="hpcell ok" data-d="${date}" data-t="${s}">◯</td>`:`<td class="hpcell x">×</td>`; }); g+='</tr>'; });
  g+='</tbody></table>';
  $('#hpgrid').innerHTML=g;
  $$('.hpcell.ok').forEach(c=>c.onclick=()=>{
    if(c.classList.contains('sel')){ c.classList.remove('sel'); resv.date=null; resv.time=null; syncResv(); return; }
    $$('.hpcell').forEach(x=>x.classList.remove('sel')); c.classList.add('sel'); resv.date=c.dataset.d; resv.time=c.dataset.t; syncResv();
  });
  $('#doReserve').onclick=submitReserve;
}
